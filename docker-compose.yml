# Pronto Satisfação — stack de desenvolvimento local
# Sobe Postgres, Redis, MinIO e (opcional) Mailpit para testar email.
# Uso: docker compose up -d
#
# O app Next.js e o worker rodam fora do compose em dev (npm run dev / npm run worker)
# para hot-reload. Em produção, ver docker-compose.prod.yml.

services:
  db:
    image: postgres:16-alpine
    container_name: pronto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pronto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pronto_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-pronto_satisfacao}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pronto}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pronto-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./docker/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pronto-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_pw}
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Console web
    volumes:
      - ./docker/data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servidor SMTP de teste para dev (captura emails sem enviar de verdade).
  # Console em http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: pronto-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI
